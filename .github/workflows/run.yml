name: Post to BotBlock

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  run:
    name: Run
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      with:
        run_install: false

    - name: Set up node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Set up build cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-build
      with:
        path: build
        key: build-${{ github.sha }}

    - name: Build project
      run: pnpm build
      if: steps.cache-build.outputs.cache-hit != 'true'

    - name: Post to Botblock
      run: npm run start
      env:
        DISCORD_BOT_ID: "467377486141980682"
        COUNTR_API_ENDPOINT: ${{ secrets.COUNTR_API_ENDPOINT }}
        BOTBLOCK_KEYS: ${{ secrets.BOTBLOCK_KEYS }}
        TOPGG_API_KEY: ${{ secrets.TOPGG_API_KEY }}
